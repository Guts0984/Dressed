services:
  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/MAJOR/docker
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
      - .:/app

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  pgdata:
